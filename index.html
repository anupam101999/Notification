<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>25 Second Beep Clock</title>

  <style>
    *{
      box-sizing:border-box;
    }

    body {
      margin: 0;
      height: 100vh;
      background: #0f172a;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      color: white;
      padding: 15px;
    }

    .clock-box {
      text-align: center;
      background: #1e293b;
      padding: 35px 25px;
      border-radius: 20px;
      width: 100%;
      max-width: 340px;
      box-shadow: 0 0 25px rgba(0,0,0,0.45);
    }

    .time {
      font-size: 52px;
      font-weight: bold;
      margin-bottom: 20px;
      color: #22c55e;
      letter-spacing: 2px;
    }

    .counter {
      font-size: 28px;
      margin-bottom: 25px;
      color: #facc15;
    }

    button {
      padding: 12px 22px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      margin: 5px;
      font-weight: bold;
      transition: 0.2s;
    }

    button:active{
      transform: scale(0.96);
    }

    .start {
      background: #22c55e;
      color: white;
    }

    .stop {
      background: #ef4444;
      color: white;
    }

    .status {
      margin-top: 18px;
      color: #cbd5e1;
      font-size: 16px;
    }

    .note{
      margin-top:10px;
      font-size:13px;
      color:#94a3b8;
    }
  </style>
</head>
<body>

  <div class="clock-box">

    <div class="time" id="clock">00:00:00</div>

    <div class="counter">
      Next beep in <span id="remaining">25</span>s
    </div>

    <button class="start" onclick="startBeeping()">Start</button>

    <button class="stop" onclick="stopBeeping()">Stop</button>

    <div class="status" id="status">Stopped</div>

    <div class="note">
      Works better on mobile Chrome now
    </div>

  </div>

  <script>

    const clockEl = document.getElementById("clock");
    const remainingEl = document.getElementById("remaining");
    const statusEl = document.getElementById("status");

    let running = false;
    let interval = null;
    let nextBeep = null;

    // SINGLE AUDIO CONTEXT
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // LIVE CLOCK
    function updateClock() {

      const now = new Date();

      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      const s = String(now.getSeconds()).padStart(2, '0');

      clockEl.innerText = `${h}:${m}:${s}`;
    }

    setInterval(updateClock, 1000);
    updateClock();

    // 3 BEEPS
    function beep3Times() {

      // resume audio on mobile if suspended
      if (audioCtx.state === "suspended") {
        audioCtx.resume();
      }

      for (let i = 0; i < 3; i++) {

        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();

        oscillator.type = "square";
        oscillator.frequency.value = 850;

        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        const start = audioCtx.currentTime + (i * 0.35);

        gainNode.gain.setValueAtTime(0.2, start);

        oscillator.start(start);
        oscillator.stop(start + 0.18);
      }
    }

    // START
    function startBeeping() {

      if (running) return;

      running = true;

      statusEl.innerText = "Running...";

      nextBeep = Date.now() + 25000;

      interval = setInterval(() => {

        const diff = nextBeep - Date.now();

        const remaining = Math.max(
          0,
          Math.ceil(diff / 1000)
        );

        remainingEl.innerText = remaining;

        // beep exactly every 25 sec
        if (diff <= 0) {

          beep3Times();

          nextBeep += 25000;
        }

      }, 200);
    }

    // STOP
    function stopBeeping() {

      running = false;

      clearInterval(interval);

      remainingEl.innerText = "25";

      statusEl.innerText = "Stopped";
    }

    // KEEP AUDIO ACTIVE ON MOBILE
    document.addEventListener("click", () => {

      if (audioCtx.state === "suspended") {
        audioCtx.resume();
      }

    });

  </script>

</body>
</html>
