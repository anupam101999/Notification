<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>28 Second Beep Clock</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b, #020617);
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .app {
      width: 100%;
      max-width: 420px;
    }

    .card {
      background: rgba(15, 23, 42, 0.85);
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 28px;
      padding: 30px;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(16px);
      text-align: center;
    }

    .badge {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(34, 197, 94, 0.12);
      color: #86efac;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 22px;
      letter-spacing: 0.3px;
    }

    .title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #f8fafc;
    }

    .subtitle {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 30px;
      line-height: 1.5;
    }

    .time {
      font-size: 56px;
      font-weight: 800;
      color: #ffffff;
      letter-spacing: 2px;
      margin-bottom: 25px;
      text-shadow: 0 0 20px rgba(34, 197, 94, 0.25);
    }

    .timer-box {
      background: rgba(30, 41, 59, 0.9);
      border-radius: 22px;
      padding: 22px 18px;
      margin-bottom: 26px;
      border: 1px solid rgba(148, 163, 184, 0.12);
    }

    .timer-label {
      font-size: 14px;
      color: #cbd5e1;
      margin-bottom: 8px;
    }

    .remaining {
      font-size: 46px;
      font-weight: 800;
      color: #facc15;
      line-height: 1;
    }

    .seconds {
      font-size: 16px;
      color: #94a3b8;
      margin-top: 6px;
    }

    .buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 20px;
    }

    button {
      flex: 1;
      padding: 14px 18px;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      cursor: pointer;
      font-weight: 700;
      transition: 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
      opacity: 0.95;
    }

    button:active {
      transform: scale(0.97);
    }

    .start {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
      box-shadow: 0 10px 22px rgba(34, 197, 94, 0.25);
    }

    .stop {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: white;
      box-shadow: 0 10px 22px rgba(239, 68, 68, 0.22);
    }

    .status-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      color: #cbd5e1;
      font-size: 15px;
      margin-top: 6px;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #ef4444;
      box-shadow: 0 0 10px rgba(239, 68, 68, 0.6);
    }

    .dot.running {
      background: #22c55e;
      box-shadow: 0 0 12px rgba(34, 197, 94, 0.8);
    }

    .note {
      margin-top: 18px;
      font-size: 13px;
      color: #64748b;
      line-height: 1.5;
    }

    @media (max-width: 420px) {
      .card {
        padding: 26px 22px;
        border-radius: 24px;
      }

      .time {
        font-size: 46px;
      }

      .remaining {
        font-size: 42px;
      }

      .buttons {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>

  <main class="app">
    <section class="card">

      <div class="badge">28 Second Beep Timer</div>

      <div class="title">Beep Clock</div>

      <div class="subtitle">
        Press start and the alarm will beep 3 times every 28 seconds.
      </div>

      <div class="time" id="clock">00:00:00</div>

      <div class="timer-box">
        <div class="timer-label">Next beep in</div>
        <div class="remaining">
          <span id="remaining">28</span>
        </div>
        <div class="seconds">seconds</div>
      </div>

      <div class="buttons">
        <button class="start" onclick="startBeeping()">Start</button>
        <button class="stop" onclick="stopBeeping()">Stop</button>
      </div>

      <div class="status-row">
        <span class="dot" id="statusDot"></span>
        <span id="status">Stopped</span>
      </div>

      <div class="note">
        Tip: On mobile, tap Start once to allow sound playback.
      </div>

    </section>
  </main>

  <script>
    const clockEl = document.getElementById("clock");
    const remainingEl = document.getElementById("remaining");
    const statusEl = document.getElementById("status");
    const statusDot = document.getElementById("statusDot");

    let running = false;
    let interval = null;
    let nextBeep = null;

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function updateClock() {
      const now = new Date();

      const h = String(now.getHours()).padStart(2, "0");
      const m = String(now.getMinutes()).padStart(2, "0");
      const s = String(now.getSeconds()).padStart(2, "0");

      clockEl.innerText = `${h}:${m}:${s}`;
    }

    setInterval(updateClock, 1000);
    updateClock();

    function beep3Times() {
      if (audioCtx.state === "suspended") {
        audioCtx.resume();
      }

      for (let i = 0; i < 3; i++) {
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();

        oscillator.type = "square";
        oscillator.frequency.value = 850;

        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        const start = audioCtx.currentTime + (i * 0.35);

        gainNode.gain.setValueAtTime(0.22, start);
        gainNode.gain.exponentialRampToValueAtTime(0.01, start + 0.18);

        oscillator.start(start);
        oscillator.stop(start + 0.18);
      }
    }

    function startBeeping() {
      if (running) return;

      if (audioCtx.state === "suspended") {
        audioCtx.resume();
      }

      running = true;

      statusEl.innerText = "Running";
      statusDot.classList.add("running");

      nextBeep = Date.now() + 28000;

      interval = setInterval(() => {
        const diff = nextBeep - Date.now();

        const remaining = Math.max(0, Math.ceil(diff / 1000));

        remainingEl.innerText = remaining;

        if (diff <= 0) {
          beep3Times();
          nextBeep += 28000;
        }
      }, 200);
    }

    function stopBeeping() {
      running = false;

      clearInterval(interval);

      remainingEl.innerText = "28";

      statusEl.innerText = "Stopped";
      statusDot.classList.remove("running");
    }

    document.addEventListener("click", () => {
      if (audioCtx.state === "suspended") {
        audioCtx.resume();
      }
    });
  </script>

</body>
</html>
