<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>25 Second Beep Clock</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #0f172a;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      color: white;
    }

    .clock-box {
      text-align: center;
      background: #1e293b;
      padding: 40px;
      border-radius: 20px;
      width: 320px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    .time {
      font-size: 52px;
      font-weight: bold;
      margin-bottom: 20px;
      color: #22c55e;
    }

    .counter {
      font-size: 28px;
      margin-bottom: 25px;
      color: #facc15;
    }

    button {
      padding: 12px 22px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      margin: 5px;
    }

    .start {
      background: #22c55e;
      color: white;
    }

    .stop {
      background: #ef4444;
      color: white;
    }

    .status {
      margin-top: 15px;
      color: #cbd5e1;
    }
  </style>
</head>
<body>

  <div class="clock-box">
    <div class="time" id="clock">00:00:00</div>

    <div class="counter">
      Next beep in <span id="remaining">25</span>s
    </div>

    <button class="start" onclick="startBeeping()">Start</button>
    <button class="stop" onclick="stopBeeping()">Stop</button>

    <div class="status" id="status">Stopped</div>
  </div>

  <script>
    const clockEl = document.getElementById("clock");
    const remainingEl = document.getElementById("remaining");
    const statusEl = document.getElementById("status");

    let running = false;
    let startTime = null;
    let interval = null;

    // LIVE CLOCK
    function updateClock() {
      const now = new Date();

      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      const s = String(now.getSeconds()).padStart(2, '0');

      clockEl.innerText = `${h}:${m}:${s}`;
    }

    setInterval(updateClock, 1000);
    updateClock();

    // BEEP FUNCTION
    function beep3Times() {
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

      for (let i = 0; i < 3; i++) {
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();

        oscillator.type = "square";
        oscillator.frequency.value = 850;

        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        const start = audioCtx.currentTime + (i * 0.35);

        gainNode.gain.setValueAtTime(0.2, start);

        oscillator.start(start);
        oscillator.stop(start + 0.18);
      }
    }

    function startBeeping() {
      if (running) return;

      running = true;
      statusEl.innerText = "Running...";

      startTime = Date.now();

      interval = setInterval(() => {

        const elapsed = Math.floor((Date.now() - startTime) / 1000);

        const remaining = 25 - (elapsed % 25);

        remainingEl.innerText = remaining;

        // EXACTLY every 25 sec
        if (elapsed > 0 && elapsed % 25 === 0) {
          beep3Times();

          // prevent multiple triggers same second
          startTime = Date.now();
        }

      }, 250);
    }

    function stopBeeping() {
      running = false;

      clearInterval(interval);

      remainingEl.innerText = "25";

      statusEl.innerText = "Stopped";
    }
  </script>

</body>
</html>
