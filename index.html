<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Custom Beep Clock</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b, #020617);
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .app {
      width: 100%;
      max-width: 460px;
    }

    .card {
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 28px;
      padding: 28px;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(16px);
      text-align: center;
    }

    .badge {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(34, 197, 94, 0.12);
      color: #86efac;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 18px;
      letter-spacing: 0.3px;
    }

    .title {
      font-size: 26px;
      font-weight: 800;
      margin-bottom: 8px;
      color: #f8fafc;
    }

    .subtitle {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 22px;
      line-height: 1.5;
    }

    .timezone-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .timezone-label {
      font-size: 14px;
      color: #cbd5e1;
      font-weight: 700;
    }

    .toggle-btn {
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(59, 130, 246, 0.15);
      border: 1px solid rgba(96, 165, 250, 0.35);
      color: #bfdbfe;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .time {
      font-size: 54px;
      font-weight: 800;
      color: #ffffff;
      letter-spacing: 2px;
      margin-bottom: 8px;
      text-shadow: 0 0 20px rgba(34, 197, 94, 0.25);
    }

    .date-text {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 22px;
    }

    .timer-box {
      background: rgba(30, 41, 59, 0.9);
      border-radius: 22px;
      padding: 22px 18px;
      margin-bottom: 22px;
      border: 1px solid rgba(148, 163, 184, 0.12);
    }

    .timer-label {
      font-size: 14px;
      color: #cbd5e1;
      margin-bottom: 8px;
    }

    .remaining {
      font-size: 46px;
      font-weight: 800;
      color: #facc15;
      line-height: 1;
    }

    .seconds {
      font-size: 16px;
      color: #94a3b8;
      margin-top: 6px;
    }

    .settings {
      background: rgba(2, 6, 23, 0.45);
      border: 1px solid rgba(148, 163, 184, 0.12);
      border-radius: 20px;
      padding: 18px;
      margin-bottom: 22px;
      text-align: left;
    }

    .settings-title {
      font-size: 15px;
      font-weight: 800;
      color: #e2e8f0;
      margin-bottom: 14px;
      text-align: center;
    }

    .field {
      margin-bottom: 14px;
    }

    .field:last-child {
      margin-bottom: 0;
    }

    label {
      display: block;
      font-size: 13px;
      color: #cbd5e1;
      margin-bottom: 7px;
      font-weight: 700;
    }

    input,
    select {
      width: 100%;
      padding: 12px 13px;
      border-radius: 12px;
      border: 1px solid rgba(148, 163, 184, 0.25);
      background: rgba(15, 23, 42, 0.9);
      color: #ffffff;
      font-size: 15px;
      outline: none;
    }

    input:focus,
    select:focus {
      border-color: #38bdf8;
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.12);
    }

    .quick-buttons {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    .quick-buttons button {
      padding: 8px;
      font-size: 13px;
      border-radius: 10px;
      background: rgba(59, 130, 246, 0.15);
      color: #bfdbfe;
      border: 1px solid rgba(96, 165, 250, 0.25);
    }

    .buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 16px;
    }

    button {
      flex: 1;
      padding: 14px 18px;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      cursor: pointer;
      font-weight: 800;
      transition: 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
      opacity: 0.95;
    }

    button:active {
      transform: scale(0.97);
    }

    .start {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
      box-shadow: 0 10px 22px rgba(34, 197, 94, 0.25);
    }

    .stop {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: white;
      box-shadow: 0 10px 22px rgba(239, 68, 68, 0.22);
    }

    .test {
      width: 100%;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
      margin-bottom: 16px;
      box-shadow: 0 10px 22px rgba(59, 130, 246, 0.22);
    }

    .status-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      color: #cbd5e1;
      font-size: 15px;
      margin-top: 6px;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #ef4444;
      box-shadow: 0 0 10px rgba(239, 68, 68, 0.6);
    }

    .dot.running {
      background: #22c55e;
      box-shadow: 0 0 12px rgba(34, 197, 94, 0.8);
    }

    .note {
      margin-top: 16px;
      font-size: 13px;
      color: #64748b;
      line-height: 1.5;
    }

    @media (max-width: 420px) {
      .card {
        padding: 24px 20px;
      }

      .time {
        font-size: 43px;
      }

      .remaining {
        font-size: 40px;
      }

      .buttons {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>

  <main class="app">
    <section class="card">

      <div class="badge">Custom Beep Timer</div>

      <div class="title">Beep Clock</div>

      <div class="subtitle">
        Set your own timer, ringtone type, and beep count.
      </div>

      <div class="timezone-row">
        <span class="timezone-label" id="timezoneLabel">IST Time</span>
        <button class="toggle-btn" onclick="toggleTimezone()" id="toggleBtn">
          Switch to EST
        </button>
      </div>

      <div class="time" id="clock">00:00:00</div>
      <div class="date-text" id="dateText">Loading date...</div>

      <div class="timer-box">
        <div class="timer-label">Next beep in</div>
        <div class="remaining">
          <span id="remaining">57</span>
        </div>
        <div class="seconds">seconds</div>
      </div>

      <div class="settings">
        <div class="settings-title">Timer Settings</div>

        <div class="field">
          <label for="intervalInput">Beep interval in seconds</label>
          <input
            type="number"
            id="intervalInput"
            min="1"
            max="3600"
            value="57"
            onchange="applySettings()"
            onkeyup="applySettings()"
          />

          <div class="quick-buttons">
            <button onclick="setIntervalValue(25)">25 sec</button>
            <button onclick="setIntervalValue(28)">28 sec</button>
            <button onclick="setIntervalValue(57)">57 sec</button>
          </div>
        </div>

        <div class="field">
          <label for="beepCountInput">How many times to beep</label>
          <input
            type="number"
            id="beepCountInput"
            min="1"
            max="20"
            value="3"
            onchange="applySettings()"
            onkeyup="applySettings()"
          />
        </div>

        <div class="field">
          <label for="ringtoneSelect">Ringtone type</label>
          <select id="ringtoneSelect" onchange="applySettings()">
            <option value="beep">Beep</option>
            <option value="soft">Soft</option>
            <option value="alert">Alert</option>
            <option value="bell">Bell</option>
          </select>
        </div>
      </div>

      <button class="test" onclick="testSound()">Test Sound</button>

      <div class="buttons">
        <button class="start" onclick="startBeeping()">Start</button>
        <button class="stop" onclick="stopBeeping()">Stop</button>
      </div>

      <div class="status-row">
        <span class="dot" id="statusDot"></span>
        <span id="status">Stopped</span>
      </div>

      <div class="note">
        Tip: Keep this page open while running. Start will try to keep your phone awake.
      </div>

    </section>
  </main>

  <script>
    const clockEl = document.getElementById("clock");
    const dateTextEl = document.getElementById("dateText");
    const remainingEl = document.getElementById("remaining");
    const statusEl = document.getElementById("status");
    const statusDot = document.getElementById("statusDot");
    const timezoneLabel = document.getElementById("timezoneLabel");
    const toggleBtn = document.getElementById("toggleBtn");

    const intervalInput = document.getElementById("intervalInput");
    const beepCountInput = document.getElementById("beepCountInput");
    const ringtoneSelect = document.getElementById("ringtoneSelect");

    let beepIntervalSeconds = 57;
    let beepIntervalMs = beepIntervalSeconds * 1000;
    let beepCount = 3;
    let ringtoneType = "beep";

    let running = false;
    let interval = null;
    let nextBeep = null;
    let wakeLock = null;

    let currentTimezone = "IST";

    const timezones = {
      IST: {
        label: "IST Time",
        buttonText: "Switch to EST",
        zone: "Asia/Kolkata"
      },
      EST: {
        label: "EST Time",
        buttonText: "Switch to IST",
        zone: "America/New_York"
      }
    };

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    async function requestWakeLock() {
      if (!("wakeLock" in navigator)) {
        return;
      }

      try {
        wakeLock = await navigator.wakeLock.request("screen");

        wakeLock.addEventListener("release", () => {
          wakeLock = null;
        });
      } catch (error) {
        wakeLock = null;
      }
    }

    async function releaseWakeLock() {
      if (!wakeLock) {
        return;
      }

      const lock = wakeLock;
      wakeLock = null;
      await lock.release();
    }

    function updateClock() {
      const selected = timezones[currentTimezone];
      const now = new Date();

      const time = new Intl.DateTimeFormat("en-US", {
        timeZone: selected.zone,
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        hour12: false
      }).format(now);

      const date = new Intl.DateTimeFormat("en-US", {
        timeZone: selected.zone,
        weekday: "short",
        day: "2-digit",
        month: "short",
        year: "numeric"
      }).format(now);

      clockEl.innerText = time;
      dateTextEl.innerText = date;
      timezoneLabel.innerText = selected.label;
      toggleBtn.innerText = selected.buttonText;
    }

    function toggleTimezone() {
      currentTimezone = currentTimezone === "IST" ? "EST" : "IST";
      updateClock();
    }

    setInterval(updateClock, 1000);
    updateClock();

    function applySettings() {
      let intervalValue = parseInt(intervalInput.value);
      let countValue = parseInt(beepCountInput.value);

      if (isNaN(intervalValue) || intervalValue < 1) {
        intervalValue = 1;
      }

      if (intervalValue > 3600) {
        intervalValue = 3600;
      }

      if (isNaN(countValue) || countValue < 1) {
        countValue = 1;
      }

      if (countValue > 20) {
        countValue = 20;
      }

      beepIntervalSeconds = intervalValue;
      beepIntervalMs = beepIntervalSeconds * 1000;
      beepCount = countValue;
      ringtoneType = ringtoneSelect.value;

      intervalInput.value = beepIntervalSeconds;
      beepCountInput.value = beepCount;

      if (!running) {
        remainingEl.innerText = beepIntervalSeconds;
      } else {
        nextBeep = Date.now() + beepIntervalMs;
      }
    }

    function setIntervalValue(seconds) {
      intervalInput.value = seconds;
      applySettings();
    }

    function getRingtoneConfig(type) {
      if (type === "soft") {
        return {
          wave: "sine",
          frequency: 620,
          volume: 0.18,
          duration: 0.22,
          gap: 0.38
        };
      }

      if (type === "alert") {
        return {
          wave: "square",
          frequency: 980,
          volume: 0.25,
          duration: 0.2,
          gap: 0.32
        };
      }

      if (type === "bell") {
        return {
          wave: "triangle",
          frequency: 760,
          volume: 0.22,
          duration: 0.35,
          gap: 0.5
        };
      }

      return {
        wave: "square",
        frequency: 850,
        volume: 0.22,
        duration: 0.18,
        gap: 0.35
      };
    }

    function playSound() {
      if (audioCtx.state === "suspended") {
        audioCtx.resume();
      }

      const config = getRingtoneConfig(ringtoneType);

      for (let i = 0; i < beepCount; i++) {
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();

        oscillator.type = config.wave;
        oscillator.frequency.value = config.frequency;

        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        const start = audioCtx.currentTime + (i * config.gap);

        gainNode.gain.setValueAtTime(config.volume, start);
        gainNode.gain.exponentialRampToValueAtTime(0.01, start + config.duration);

        oscillator.start(start);
        oscillator.stop(start + config.duration);
      }
    }

    function testSound() {
      applySettings();
      playSound();
    }

    function startBeeping() {
      if (running) return;

      applySettings();

      if (audioCtx.state === "suspended") {
        audioCtx.resume();
      }

      running = true;
      requestWakeLock();

      statusEl.innerText = "Running";
      statusDot.classList.add("running");

      nextBeep = Date.now() + beepIntervalMs;

      interval = setInterval(() => {
        const diff = nextBeep - Date.now();
        const remaining = Math.max(0, Math.ceil(diff / 1000));

        remainingEl.innerText = remaining;

        if (diff <= 0) {
          playSound();
          nextBeep += beepIntervalMs;
        }
      }, 200);
    }

    async function stopBeeping() {
      running = false;

      clearInterval(interval);
      await releaseWakeLock();

      applySettings();

      statusEl.innerText = "Stopped";
      statusDot.classList.remove("running");
    }

    document.addEventListener("click", () => {
      if (audioCtx.state === "suspended") {
        audioCtx.resume();
      }
    });

    document.addEventListener("visibilitychange", () => {
      if (running && document.visibilityState === "visible") {
        requestWakeLock();
      }
    });
  </script>

</body>
</html>
